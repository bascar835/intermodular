<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiencias por Categoría</title>
    <link rel="stylesheet" href="/css/categorias.css">
</head>
<body>

<div class="container">

    <!-- CABECERA -->
    <div class="cabecera">
        <h1>Explora nuestras experiencias</h1>
        <p>Elige una categoría para ver las experiencias disponibles.</p>
    </div>

    <!-- GRID DE CATEGORÍAS -->
    <h2>Categorías</h2>
    <div id="grid-categorias" class="grid">
        <!-- Se rellena con JS -->
    </div>

    <!-- SPINNER -->
    <div id="spinner" class="spinner">
        <p>Cargando experiencias...</p>
    </div>

    <!-- SECCIÓN DE EXPERIENCIAS -->
    <div id="seccion-experiencias">
        <hr>

        <div class="titulo-categoria">
            <h2 id="titulo-categoria"></h2>
            <span id="badge-total"></span>
        </div>

        <!-- Mensaje sin datos -->
        <div id="sin-experiencias" class="mensaje">
            Esta categoría no tiene experiencias disponibles aún.
        </div>

        <div id="grid-experiencias" class="grid">
            <!-- Se rellena con JS -->
        </div>
    </div>

</div>

<script src="/js/categorias.js"></script>
</body>
</html>
