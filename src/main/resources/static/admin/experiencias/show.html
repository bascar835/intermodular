<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle de experiencia | XPerioPRO Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin-layout.css">
</head>
<body>

    <div class="admin-main">
        <div class="admin-topbar">
            <span class="page-title" id="titulo-header"></span>
            <div class="topbar-user"><span>👤</span><span class="user-name">Admin</span></div>
        </div>
        <div class="admin-content">
            <div class="admin-card" style="padding:24px;">
                <!-- Galería de imágenes -->
                <div id="galeria-wrap" style="margin-bottom:20px;display:none;">
                    <div style="width:100%;max-width:480px;aspect-ratio:16/9;background:#111;border-radius:10px;overflow:hidden;margin-bottom:10px;">
                        <img id="galeria-principal" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;">
                    </div>
                    <div id="galeria-thumbs" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
                </div>
                <p><strong>Título:</strong> <span id="titulo"></span></p>
                <p style="margin-top:8px;"><strong>Descripción:</strong> <span id="descripcion"></span></p>
                <p style="margin-top:8px;"><strong>Precio:</strong> <span id="precio"></span> €</p>
                <p style="margin-top:8px;"><strong>Ubicación:</strong> <span id="ubicacion"></span></p>
                <p style="margin-top:8px;"><strong>Duración:</strong> <span id="duracion_horas"></span> h</p>
                <p style="margin-top:8px;"><strong>Categoría ID:</strong> <span id="categoria_id"></span></p>
                <div style="margin-top:24px;display:flex;gap:8px;">
                    <a id="editar" class="btn-primary" style="background:#b45309;">Editar</a>
                    <a href="index.html" class="btn-primary" style="background:#6b7280;">Volver</a>
                </div>
            </div>
        </div>
    </div>

<script src="/js/auth.js"></script>
<script src="js/show.js"></script>
<script src="/admin/js/admin-sidebar.js"></script>
</body>
</html>
