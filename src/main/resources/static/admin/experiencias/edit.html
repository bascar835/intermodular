<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar experiencia | XPerioPRO Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin-layout.css">
</head>
<body>

    <div class="admin-main">
        <div class="admin-topbar">
            <span class="page-title">Editar experiencia</span>
            <div class="topbar-user"><span>👤</span><span class="user-name">Admin</span></div>
        </div>
        <div class="admin-content">
            <div class="admin-card" style="padding:24px;">
                <form class="admin-form" onsubmit="guardar(event)">

                    <div class="form-group">
                        <label>Título</label>
                        <input id="titulo" required>
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="descripcion"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Precio (€)</label>
                        <input id="precio" type="number" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Ubicación</label>
                        <input id="ubicacion">
                    </div>
                    <div class="form-group">
                        <label>Duración (horas)</label>
                        <input id="duracion_horas" type="number" required>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="categoria_id"></select>
                    </div>
                    <div class="form-group">
                        <label>Imágenes actuales</label>
                        <div id="galeria-actual" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;"></div>
                        <span id="sin-imagen" style="color:#9ca3af;font-size:0.9em;display:none;">Sin imágenes</span>
                        <label style="margin-top:8px;display:block;">Añadir nueva imagen</label>
                        <input id="imagen" type="file" accept="image/jpeg,image/png,image/webp" onchange="previewImagen()">
                        <img id="preview" style="display:none;margin-top:10px;max-width:200px;border-radius:6px;">
                    </div>

                    <button class="btn-primary" type="submit">Guardar</button>
                    <a href="index.html" class="btn-primary" style="background:#6b7280;margin-left:8px;">Cancelar</a>
                </form>
            </div>
        </div>
    </div>

<script src="/js/auth.js"></script>
<script src="js/edit.js"></script>
<script src="/admin/js/admin-sidebar.js"></script>
</body>
</html>
