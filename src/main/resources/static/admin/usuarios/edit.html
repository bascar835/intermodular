<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar usuario | XPerioPRO Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin-layout.css">
</head>
<body>
    <div class="admin-main">
        <div class="admin-topbar">
            <span class="page-title">Editar usuario</span>
            <div class="topbar-user"><span>👤</span><span class="user-name">Admin</span></div>
        </div>
        <div class="admin-content">
            <div class="admin-card" style="padding:24px;">
                <form class="admin-form" onsubmit="guardar(event)">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input id="nombre" placeholder="Nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input id="email" type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <label>Nueva contraseña</label>
                        <input id="password" type="password" placeholder="Dejar vacío para no cambiar">
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <select id="rol">
                            <option value="ROLE_USER">Usuario</option>
                            <option value="ROLE_ADMIN">Admin</option>
                        </select>
                    </div>
                    <button class="btn-primary" type="submit">Guardar cambios</button>
                    <a href="index.html" class="btn-primary" style="background:#6b7280;margin-left:8px;">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
<script src="/js/auth.js"></script>
<script src="js/edit.js"></script>
<script src="/admin/js/admin-sidebar.js"></script>
</body>
</html>
