<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | XPerioPRO Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
</head>
<body>

    <div class="admin-main">

        <div class="admin-topbar">
            <span class="page-title">Usuarios</span>
            <div class="topbar-user">
                <span>👤</span>
                <span class="user-name">Admin</span>
            </div>
        </div>

        <div class="admin-content">
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2>Listado de usuarios</h2>
                    <a href="create.html" class="btn-primary">+ Nuevo usuario</a>
                </div>
                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="/admin/js/admin-sidebar.js"></script>
	<script src="/js/auth.js"></script>
    <script src="js/index.js"></script>
	

</body>
</html>
