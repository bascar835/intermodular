<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuevo Usuario</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container mt-5">

    <h1 class="mb-4">Nuevo Usuario</h1>

    <form onsubmit="guardar(event)">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input id="nombre" class="form-control" placeholder="Nombre" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input id="password" type="password" class="form-control" placeholder="Contraseña" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Rol</label>
            <select id="rol" class="form-select">
                <option value="ROLE_USER">Usuario</option>
                <option value="ROLE_ADMIN">Admin</option>
            </select>
        </div>

        <button class="btn btn-primary">Guardar</button>
        <a href="index.html" class="btn btn-secondary">Cancelar</a>

    </form>

</div>
<script src="/js/auth.js"></script>
<script src="js/create.js"></script>
</body>
</html>
