<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva reserva | XPerioPRO Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/admin-layout.css">
</head>
<body>
    <div class="admin-main">
        <div class="admin-topbar">
            <span class="page-title">Nueva reserva</span>
            <div class="topbar-user"><span>👤</span><span class="user-name">Admin</span></div>
        </div>
        <div class="admin-content">
            <div class="admin-card" style="padding:24px;">
                <form class="admin-form" onsubmit="guardar(event)">
                    <div class="form-group">
                        <label>Usuario ID</label>
                        <input id="usuario_id" type="number" required>
                    </div>
                    <div class="form-group">
                        <label>Experiencia ID</label>
                        <input id="experiencia_id" type="number" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha Reserva</label>
                        <input id="fecha_reserva" type="datetime-local" required>
                    </div>
                    <div class="form-group">
                        <label>Número de personas</label>
                        <input id="numero_personas" type="number" required>
                    </div>
                    <div class="form-group">
                        <label>Precio total</label>
                        <input id="precio_total" type="number" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <input id="estado" value="pendiente" required>
                    </div>
                    <button class="btn-primary" type="submit">Guardar</button>
                    <a href="index.html" class="btn-primary" style="background:#6b7280;margin-left:8px;">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
<script src="/js/auth.js"></script>
<script src="js/create.js"></script>
<script src="/admin/js/admin-sidebar.js"></script>
</body>
</html>
