<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Reserva</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/reservas.css">
</head>
<body>
<div class="container">

    <h1>Editar Reserva</h1>

    <form onsubmit="guardar(event)">

        <div class="mb-3">
            <label class="form-label">Usuario ID</label>
            <input id="usuario_id" type="number" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Experiencia ID</label>
            <input id="experiencia_id" type="number" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha Reserva</label>
            <input id="fecha_reserva" type="datetime-local" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Número de personas</label>
            <input id="numero_personas" type="number" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio total</label>
            <input id="precio_total" type="number" step="0.01" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <input id="estado" class="form-control" required>
        </div>

        <button class="btn btn-primary">Actualizar</button>
        <a href="index.html" class="btn btn-secondary">Cancelar</a>

    </form>
</div>

<script src="/js/auth.js"></script>
<script src="js/edit.js"></script>
</body>
</html>
