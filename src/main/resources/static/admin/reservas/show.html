
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

                <div style="margin-top:24px;display:flex;gap:8px;">
                    <a id="editar" href="#" class="btn-primary" style="background:#b45309;">Editar</a>
