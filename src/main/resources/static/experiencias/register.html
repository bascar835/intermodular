<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · Xperiabox</title>
    <link rel="stylesheet" href="/experiencias/css/experiencia.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h1>Crear cuenta</h1>
            <p>Únete para reservar experiencias únicas.</p>

            <input type="text"     id="nombre"    placeholder="Nombre completo" autocomplete="name">
            <input type="email"    id="correo"    placeholder="Correo electrónico" autocomplete="email">
            <input type="password" id="contrasena" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password">

            <button class="btn-main" onclick="registrar()">Crear cuenta</button>

            <p id="mensajeError" class="error-text"></p>

            <p style="margin-top:20px; font-size:13px; color:var(--color-text-secondary)">
                ¿Ya tienes cuenta? <a href="/experiencias/login.html" style="color:#e11d48; font-weight:600;">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script src="/experiencias/js/navbar.js"></script>
    <script src="js/register.js"></script>

</body>
</html>
