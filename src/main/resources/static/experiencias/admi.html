<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | Administrador</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <div class="admin-sidebar">
        <div class="logo">⚙️ ADMIN<span>PANEL</span></div>
        <nav>
            <ul>
                <li><a href="#"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-box"></i> Gestionar Experiencias</a></li>
                <li><a href="#"><i class="fas fa-users"></i> Usuarios</a></li>
                <li><a href="index.html"><i class="fas fa-eye"></i> Ver Web</a></li>
            </ul>
        </nav>
    </div>

    <main class="admin-main">
        <header class="admin-header">
            <h2>Gestión de Experiencias</h2>
            <button class="btn-main" onclick="nuevaExperiencia()">+ Nueva Experiencia</button>
        </header>

        <section class="admin-stats">
            <div class="stat-card"><h3>120</h3><p>Ventas Hoy</p></div>
            <div class="stat-card"><h3>45</h3><p>Nuevos Usuarios</p></div>
            <div class="stat-card"><h3>€1,240</h3><p>Ingresos</p></div>
        </section>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Imagen</th>
                    <th>Título</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#001</td>
                    <td><img src="https://via.placeholder.com/50" alt=""></td>
                    <td>Tour Bernabéu</td>
                    <td>25€</td>
                    <td>
                        <button class="btn-edit">📝</button>
                        <button class="btn-delete">🗑️</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
	<script src="js/admin.js"></script>
</body>
</html>
