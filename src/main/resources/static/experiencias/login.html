<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Xperiabox</title>
    <link rel="stylesheet" href="/experiencias/css/experiencia.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h1>Iniciar Sesión</h1>
            <p>Accede para guardar tus experiencias favoritas y ver tus reservas.</p>

            <input type="email" id="correo" placeholder="Correo electrónico" autocomplete="email">
            <input type="password" id="contrasena" placeholder="Contraseña" autocomplete="current-password">

            <button class="btn-main" onclick="login()">Entrar</button>

            <p id="mensajeError" class="error-text"></p>

            <p style="margin-top:20px; font-size:13px; color:var(--color-text-secondary)">
                ¿No tienes cuenta? <a href="/experiencias/register.html" style="color:#e11d48; font-weight:600;">Regístrate</a>
            </p>
        </div>
    </div>

    <script src="/experiencias/js/navbar.js"></script>
    <script src="js/login.js"></script>

</body>
</html>
